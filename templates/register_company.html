<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Registration — Placement Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-body">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <h2>Placement<span>Portal</span></h2>
      <p>Company Registration</p>
    </div>
    {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
    {% if success %}<div class="alert alert-success py-2">{{ success }}</div>{% endif %}
    <form method="POST" action="/register_company">
      <div class="mb-3">
        <label class="form-label">Company Name *</label>
        <input type="text" name="name" class="form-control" required placeholder="Official company name">
      </div>
      <div class="mb-3">
        <label class="form-label">HR Contact *</label>
        <input type="text" name="hr_contact" class="form-control" required placeholder="HR email or phone">
      </div>
      <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="url" name="website" class="form-control" placeholder="https://yourcompany.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Company Description</label>
        <textarea name="description" class="form-control" rows="3" placeholder="Brief about your company..."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Password *</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2">
        <i class="bi bi-building-add me-2"></i>Submit Registration
      </button>
    </form>
    <div class="alert alert-warning py-2 small mt-3">
      <i class="bi bi-info-circle me-1"></i>Your account requires admin approval before you can log in.
    </div>
    <div class="text-center mt-2">
      <a href="/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
</body></html>
