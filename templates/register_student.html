<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration — Placement Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-body">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <h2>Placement<span>Portal</span></h2>
      <p>Student Registration</p>
    </div>
    {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
    <form method="POST" action="/register_student">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" name="name" class="form-control" required placeholder="Your full name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone Number *</label>
          <input type="text" name="phone" class="form-control" required placeholder="10-digit number">
        </div>
        <div class="col-12">
          <label class="form-label">Email Address *</label>
          <input type="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Branch / Department</label>
          <input type="text" name="branch" class="form-control" placeholder="e.g. CSE, ECE, MBA">
        </div>
        <div class="col-md-6">
          <label class="form-label">CGPA</label>
          <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" placeholder="e.g. 8.50">
        </div>
        <div class="col-md-6">
          <label class="form-label">Graduation Year</label>
          <input type="number" name="graduation_year" class="form-control" placeholder="e.g. 2025">
        </div>
        <div class="col-md-6">
          <label class="form-label">Password *</label>
          <input type="password" name="password" class="form-control" required placeholder="Min 6 characters">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-person-check me-2"></i>Create Student Account
          </button>
        </div>
      </div>
    </form>
    <hr class="my-3">
    <div class="text-center">
      <a href="/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
</body></html>
