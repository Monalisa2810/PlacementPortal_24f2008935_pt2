<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Placement Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Placement<span>Portal</span></h2>
      <p>Campus Recruitment Management System</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 mb-3"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}
    <form method="POST" action="/">
      <div class="mb-3">
        <label class="form-label">Login As</label>
        <div class="role-tabs">
          <button type="button" class="role-tab active" onclick="setRole('student',this)"><i class="bi bi-mortarboard"></i> Student</button>
          <button type="button" class="role-tab" onclick="setRole('company',this)"><i class="bi bi-building"></i> Company</button>
          <button type="button" class="role-tab" onclick="setRole('admin',this)"><i class="bi bi-shield"></i> Admin</button>
        </div>
        <input type="hidden" name="role" id="roleInput" value="student">
      </div>
      <div class="mb-3">
        <label class="form-label" id="idLabel">Email Address</label>
        <input type="text" name="email" id="idInput" class="form-control" placeholder="Enter email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <hr class="my-3">
    <p class="text-center text-muted small mb-2">New here? Register below</p>
    <div class="d-grid gap-2">
      <a href="/register_student" class="btn btn-outline-primary"><i class="bi bi-person-plus me-2"></i>Register as Student</a>
      <a href="/register_company" class="btn" style="border:2px solid var(--success);color:var(--success);border-radius:8px;font-weight:600;background:transparent;">
        <i class="bi bi-building-add me-2"></i>Register as Company
      </a>
    </div>
  </div>
</div>
<script>
function setRole(role, el) {
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const labels = {student:'Email Address', company:'Company Name', admin:'Admin Username'};
  const places = {student:'Enter your email', company:'Enter company name', admin:'Enter username'};
  document.getElementById('idLabel').textContent = labels[role];
  document.getElementById('idInput').placeholder = places[role];
}
</script>
</body></html>
